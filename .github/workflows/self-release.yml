name: self-release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      from_tag:
        description: Optional base tag override for release PR planning
        required: false
        type: string
      base_branch:
        description: Base branch used by release-pr mode
        required: true
        default: main
        type: string
      pr_branch:
        description: Branch used to hold release PR changes
        required: true
        default: release-kthx/release-pr
        type: string

jobs:
  verify:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release-kthx config
        uses: ./.
        with:
          mode: check
          path: .

      - name: Plan release for this repo
        uses: ./.
        with:
          mode: plan
          path: .

  release_pr:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merged release payload
        id: detect_release_payload
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "skip_release_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$before" "$after")
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "skip_release_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_manifest=false
          for file in "${files[@]}"; do
            if [[ "$file" =~ (^|/)Cargo.toml$ ]]; then
              has_manifest=true
              continue
            fi
            echo "skip_release_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          done

          if [[ "$has_manifest" == true ]]; then
            echo "skip_release_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_release_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release PR
        if: github.event_name == 'workflow_dispatch' || steps.detect_release_payload.outputs.skip_release_pr != 'true'
        uses: ./.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          mode: release-pr
          path: .
          from-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.from_tag || '' }}
          base-branch: ${{ github.event_name == 'workflow_dispatch' && inputs.base_branch || 'main' }}
          pr-branch: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_branch || 'release-kthx/release-pr' }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release-merge payload
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(git diff --name-only "$before" "$after")

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_manifest=false
          for file in "${files[@]}"; do
            if [[ "$file" =~ (^|/)Cargo.toml$ ]]; then
              has_manifest=true
              continue
            fi
            echo "non-release file changed: $file"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          done

          if [[ "$has_manifest" == true ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish merged release
        if: steps.detect.outputs.should_publish == 'true'
        uses: ./.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          mode: publish
          path: .
          dry-run: "false"
          push: "true"
