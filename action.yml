name: release-kthx
description: Private-repo-first release automation for Rust projects
author: release-kthx

inputs:
  mode:
    description: "Command to execute: init | check | plan | release-pr | release | publish | publish-on-merge"
    required: false
    default: plan
  path:
    description: "Repository path to operate on"
    required: false
    default: .
  from-tag:
    description: "Optional base tag for commit range (plan/release-pr/release)"
    required: false
  base-branch:
    description: "Base branch for release-pr mode"
    required: false
    default: "main"
  pr-branch:
    description: "Branch name used for release-pr mode"
    required: false
    default: "release-kthx/release-pr"
  dry-run:
    description: "When mode=release/publish/publish-on-merge, do not create git tag/release"
    required: false
    default: "true"
  push:
    description: "When mode=release/publish/publish-on-merge and dry-run=false, push created tag to origin"
    required: false
    default: "true"
  force:
    description: "When mode=init, overwrite existing release-kthx.toml"
    required: false
    default: "false"

runs:
  using: docker
  image: Dockerfile

branding:
  icon: upload-cloud
  color: gray-dark
